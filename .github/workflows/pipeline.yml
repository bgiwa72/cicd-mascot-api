name: pipeline

on: [push, workflow_dispatch]

env:
  SERVICE_NAME: mascot-api

jobs:
  lint-and-test:
    name: Linting and Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Install Requirements
        run: pip install --requirement development-requirements.txt

      - name: Lint code
        run: |
          flake8 --ignore=E501,E231 *.py
          pylint --disable=C0301 *.py

      - name: Run Unit Tests
        run: python -m unittest --verbose --failfast
        
  build:
    needs: [lint-and-test]
    runs-on: ubuntu-latest

    permissions: 
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: metadata  
        uses: docker/metadata-action@v5  
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=short,prefix=,suffix=
            type=sha,format=long,prefix=,suffix=
            type=ref,event=branch,prefix=,suffix=

      - name: Build and push the container image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64, linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

  test-image:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      packages: read

    steps:
      - name: Log into ghrc.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: Pull the image from GitHub Container Registry 
        run: docker pull ghcr.io/${{ github.repository }}:${{ github.sha }}  

      - name: Start ${{ env.SERVICE_NAME }} 
        run: |
          docker run \
            --rm --detach --publish 8080:8080 \
            --name $SERVICE_NAME ghcr.io/${{ github.repository }}:${{ github.sha }}
          sleep 3 # allow some time for the service to start     
      
        
      - name: Run tests using the container image
        run: |
          docker exec $SERVICE_NAME \
            curl --silent --show-error --fail localhost:8080/health
          docker exec $SERVICE_NAME \
            curl --silent --show-error --fail localhost:8080/05024756-765e-41a9-89d7-1407436d9a58
      
      - name: Stop ${{ env.SERVICE_NAME }}
        run: docker stop $SERVICE_NAME

  deploy:
    needs: test-image
    runs-on: ubuntu-latest

    permissions:
      packages: read
      id-token: write

    steps:
    - name: Log into GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Pull the image from GitHub Container Registry
      run: docker pull ghcr.io/${{ github.repository }}:${{ github.sha }}

    - name: Tag the image
      run: |
        echo "Tag image for cloud deployment"
        docker tag ghcr.io/${{ github.repository }}:${{ github.sha }} fake.registry.local/${{ github.repository }}:${{ github.sha }}
        docker image ls

    - name: Simulate Pushing to Remote Registry
      run: |
        echo "Push fake.registry.local/${{ github.repository }}:${{ github.sha }}"
        sleep 2

    - name: Deploy to cloud service 😉
      run: |
        echo "Deploy to cloud service..."
        sleep 2
        echo "Deployment complete."

    - name: Test the Live Application
      run: |
        echo "Testing DEPLOY_URL: https://fake.run.app"
        echo "HTTP 200 OK - /health"
        echo '{"mascots_loaded":10,"service":"mascot","status":"healthy"}'
        echo "HTTP 200 OK - /05024756-765e-41a9-89d7-1407436d9a58"
        echo '{"guid":"05024756-765e-41a9-89d7-1407436d9a58","latlong":"42.026111,-93.648333","location":"Ames, IA, USA","mascot":"Cy","nickname":"Cyclones","school":"Iowa State University"}'      
